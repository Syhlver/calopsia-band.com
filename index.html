<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calopsia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.3);
      --cream: #f0e8d8;
      --muted: rgba(232, 224, 208, 0.4);
    }

    body {
      background: #0a0a0a;
      color: #e8e0d0;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      z-index: 99;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
    }

    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 0.3em;
    }

    .title em {
      font-style: italic;
      color: var(--gold);
    }

    .rule {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 2rem auto;
    }

    .message {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 2;
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 2.5rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: blink 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; background: var(--gold); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <p class="label">Calopsia</p>
    <h1 class="title">Soon<em>.</em></h1>
    <div class="rule"></div>
    <p class="message">
      something is collapsing<br>into shape
    </p>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
